<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DATAD — Offline</title>
  <meta name="theme-color" content="#4f46e5" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --indigo: #4f46e5; --bg: #0a0a0f; --fg: #f9fafb; --muted: #6b7280; }
    @media (prefers-color-scheme: light) {
      :root { --bg: #f7f8fb; --fg: #111827; --muted: #6b7280; }
    }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      background: var(--indigo);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 40px;
      font-weight: 800;
      color: white;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--muted); font-size: 0.95rem; max-width: 360px; line-height: 1.6; margin-bottom: 2rem; }
    button {
      background: var(--indigo);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.75rem 2rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
    .signal {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="icon">D</div>
  <h1>You're offline</h1>
  <p>No internet connection. Open DATAD again once you're back online — recently visited pages will load from cache.</p>
  <button onclick="window.location.reload()">Try again</button>
  <p class="signal">Your notes, planner, and journal are cached for offline access.</p>
</body>
</html>
