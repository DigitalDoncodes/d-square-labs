<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- viewport-fit=cover exposes the full screen including notch / home indicator -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>DATAD</title>
    <meta name="description" content="AI-powered personal operating system for students." />

    <!-- Typeface: Inter drives the entire type system. JetBrains Mono is used
         sparingly (login page's terminal-style accents) — not a system-wide font. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (shown in browser chrome & Android task switcher) -->
    <meta name="theme-color" content="#0B0D10" />
    <meta name="color-scheme" content="dark light" />

    <!-- Theme resolution, before first paint. Mirrors ThemeContext's rule
         (dark-first; an explicit saved choice always wins) so a light-theme
         user never sees a flash of the dark surface. Keep the two in sync. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved
            ? saved === 'dark'
            : !window.matchMedia('(prefers-color-scheme: light)').matches;
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96x96.png" />

    <!-- iOS / Safari PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="DATAD" />
    <link rel="apple-touch-icon" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/icons/icon-128x128.png" />

    <!-- Windows tiles -->
    <meta name="msapplication-TileColor" content="#4f46e5" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DATAD" />
    <meta property="og:description" content="AI-powered personal operating system for students." />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DATAD" />
    <meta name="twitter:description" content="AI-powered Student Operating System." />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
